<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Page</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    }

    .container{
        text-align:center;
        background:rgba(255,255,255,0.08);
        padding:50px;
        border-radius:20px;
        box-shadow:0 8px 25px rgba(0,0,0,0.4);
        backdrop-filter:blur(8px);
    }

    h1{
        color:white;
        font-size:45px;
        margin-bottom:30px;
    }

    .go-btn{
        display:inline-block;
        padding:15px 40px;
        font-size:20px;
        border-radius:50px;
        text-decoration:none;
        background:#22c55e;
        color:white;
        transition:0.3s;
        font-weight:bold;
    }

    .go-btn:hover{
        background:#16a34a;
        transform:scale(1.08);
    }
</style>
</head>

<body>

<div class="container">
    <h1>Welcome To Deverop Mboniragira paci fque</h1>

    <!-- LINK BUTTON -->
    <a href="paccy.html" class="go-btn">

</div>

</body>
</html>
